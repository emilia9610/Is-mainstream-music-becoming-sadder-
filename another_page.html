<!DOCTYPE html>
<html>
<head> 
  <meta charset="UTF-8"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>

  <style>
    /*background of the website*/
    body {
      background: white;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .page {
      background: white;
      width: 1000px;
      padding: 72px 64px;
    }

    /* header centered */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    /*each row of music lines*/
    .staff-block {
      margin-bottom: 52px;
    }

    /*actual lines drawn inside each row*/
    svg.staff {
      width: 100%;
      display: block;
    }
  </style>
</head>

<body>

  <div class="page" id="page">
    <div class="header"> 
      <h1>The sound of sadness</h1>
    </div>
  </div>

  <script>
    const page = document.getElementById('page');
    const totalStaves = 8;

    for (let i = 0; i < totalStaves; i++) {
      page.innerHTML += `
        <div class="staff-block">
          <svg class="staff" viewBox="0 0 512 36" fill="none" xlm="http://www.w3.org/2000/svg">
            <line x1="0" y1="4"  x2="512" y2="4"  stroke="#c0c0bc" stroke-width="0.8"/>
            <line x1="0" y1="12" x2="512" y2="12" stroke="#c0c0bc" stroke-width="0.8"/>
            <line x1="0" y1="20" x2="512" y2="20" stroke="#c0c0bc" stroke-width="0.8"/>
            <line x1="0" y1="28" x2="512" y2="28" stroke="#c0c0bc" stroke-width="0.8"/>
            <line x1="0" y1="36" x2="512" y2="36" stroke="#c0c0bc" stroke-width="0.8"/>
          </svg>
        </div>`;
    }
  </script>

</body>
</html>
